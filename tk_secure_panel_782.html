<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#222;
color:white;
}

.card{
background:#333;
padding:30px;
border-radius:10px;
text-align:center;
}

input,button{
padding:10px;
margin:10px;
width:100%;
}
</style>
</head>

<body>

<div class="card">

<h2>Admin Panel</h2>

<input type="password" id="pass" placeholder="Admin Password">

<button onclick="login()">Login</button>

<button onclick="updateIP()">Update Office IP</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
 apiKey:"AIzaSyAf...",
 authDomain:"office-attendance-28117.firebaseapp.com",
 databaseURL:"https://office-attendance-28117-default-rtdb.firebaseio.com/",
 projectId:"office-attendance-28117"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let adminLogged=false;

window.login=function(){

const password=document.getElementById("pass").value;

if(password==="admin123"){
adminLogged=true;
alert("Admin Login Success");
}else{
alert("Wrong Password");
}

}

window.updateIP=async function(){

if(!adminLogged){
alert("Login First");
return;
}

const res=await fetch("https://api.ipify.org?format=json");
const data=await res.json();

await set(ref(db,"officeSettings/officeIP"),data.ip);

alert("Office IP Updated Successfully");

}

</script>

</body>
</html>
